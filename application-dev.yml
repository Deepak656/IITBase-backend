spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDISHOST:localhost}
      port: ${REDISPORT:6379}
      timeout: 2000
      connect-timeout: 2000
  redis:
    lettuce:
      pool:
        enabled: true
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# Sendgrid
sendgrid:
  api:
    key: ${SENDGRID_API_KEY}
  from-email: ${FROM_EMAIL:hello@iitbase.com}
# Resend (active)
resend:
  api-key: ${RESEND_API_KEY}
# Email provider — swap this one value to change vendor
# Supported: resend | brevo | sendgrid
email:
  provider: resend
  from: ${FROM_EMAIL:hello@iitbase.com}
  enabled: ${EMAIL_ENABLED:true}
  otp-enabled: ${EMAIL_OTP_ENABLED:true}
  events-enabled: ${EMAIL_EVENTS_ENABLED:true}
logging:
  level:
    com:
      iitbase: INFO
    org:
      springframework:
        security: DEBUG