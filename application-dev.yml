spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 60000

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

sendgrid:
  api:
    key: ${SENDGRID_API_KEY}
  from-email: ${SENDGRID_FROM_EMAIL}

logging:
  level:
    com:
      iitbase: INFO
    org:
      springframework:
        security: DEBUG