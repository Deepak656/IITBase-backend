#application-dev.yml
spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
redis:
  url: redis://localhost:6379
# Sendgrid
sendgrid:
  api:
    key: ${SENDGRID_API_KEY}
  from-email: ${FROM_EMAIL:hello@iitbase.com}
# Resend (active)
resend:
  api-key: ${RESEND_API_KEY}
# Email provider — swap this one value to change vendor
# Supported: resend | brevo | sendgrid
email:
  provider: resend
  from: ${FROM_EMAIL:hello@iitbase.com}
  enabled: ${EMAIL_ENABLED:true}
  otp-enabled: ${EMAIL_OTP_ENABLED:true}
  events-enabled: ${EMAIL_EVENTS_ENABLED:true}
logging:
  level:
    com:
      iitbase: INFO
    org:
      springframework:
        security: DEBUG
llm:
  provider: openai   # switch to 'openai' when OpenAiResumeParser is added
anthropic:
  api-key: ${ANTHROPIC_API_KEY}  # set in Railway env vars
openai:
  api-key: ${OPENAI_API_KEY}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
