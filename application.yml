##application.yml
spring:
  profiles:
    active: ${ACTIVE_PROFILE:prod}
  application:
    name: iitbase-backend
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  flyway:
    enabled: false
    baseline-on-migrate: false
  task:
    execution:
       pool:
         core-size: 2
         max-size: 5
         queue-capacity: 100
       thread-name-prefix: async-

server:
  port: ${PORT:8080}
  error:
    include-message: always

app:
  report-threshold: 3
  base-url: https://iitbase.com
  admin:
    seed-email: ${ADMIN_SEED_EMAIL}
bucket4j:
  enabled: true
  filters:
    - cache-name: rate-limit-buckets
      url: /api/auth/.*
      rate-limits:
        - bandwidths:
            - capacity: 10
              time: 1
              unit: hours

# Brevo (standby — uncomment when needed)
# brevo:
#   api-key: ${BREVO_API_KEY}

# SendGrid (legacy)
# sendgrid:
#   api-key: ${SENDGRID_API_KEY}

# Sender identity — shared across all providers
sendgrid:
  from-email: hello@iitbase.com

r2:
  account-id: ${R2_ACCOUNT_ID}
  access-key: ${R2_ACCESS_KEY}
  secret-key: ${R2_SECRET_KEY}
  bucket: ${R2_BUCKET:iitbase-uploads}
  public-url: ${R2_PUBLIC_URL}   # e.g. https://pub-xxxx.r2.dev  (from R2 bucket settings)

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, env, loggers

  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

  health:
    redis:
      enabled: true
    db:
      enabled: true

  metrics:
    tags:
      application: iitbase-backend