##application.yml
spring:
  profiles:
    active: ${ACTIVE_PROFILE:prod}
  application:
    name: iitbase-backend
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        format_sql: true
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  flyway:
    enabled: false
    baseline-on-migrate: false
  task:
    execution:
       pool:
         core-size: 1                # was 2 — you have 1 signup/day
         max-size: 3                 # was 5
         queue-capacity: 25          # was 50
       thread-name-prefix: async-
  datasource:
    hikari:
      maximum-pool-size: 3          # was defaulting to 10 — saves ~35–70MB
      minimum-idle: 1               # don't hold 3 connections when idle
      idle-timeout: 300000          # release idle connections after 5 min
      connection-timeout: 20000
      max-lifetime: 1200000
  data:
    redis:
      lettuce:
        pool:
          max-active: 3             # default is 8
          max-idle: 2
          min-idle: 0               # release when not in use
          time-between-eviction-runs: 60000
server:
  port: ${PORT:8080}
  error:
    include-message: always

app:
  report-threshold: 3
  base-url: https://iitbase.com
  admin:
    seed-email: ${ADMIN_SEED_EMAIL}
bucket4j:
  enabled: true
  filters:
    - cache-name: rate-limit-buckets
      url: /api/auth/.*
      rate-limits:
        - bandwidths:
            - capacity: 10
              time: 1
              unit: hours

# Brevo (standby — uncomment when needed)
# brevo:
#   api-key: ${BREVO_API_KEY}

# SendGrid (legacy)
# sendgrid:
#   api-key: ${SENDGRID_API_KEY}

# Sender identity — shared across all providers
sendgrid:
  from-email: hello@iitbase.com

r2:
  account-id: ${R2_ACCOUNT_ID}
  access-key: ${R2_ACCESS_KEY}
  secret-key: ${R2_SECRET_KEY}
  bucket: ${R2_BUCKET:iitbase-uploads}
  public-url: ${R2_PUBLIC_URL}   # e.g. https://pub-xxxx.r2.dev  (from R2 bucket settings)

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus

  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    metrics:
      enabled: true

  health:
    redis:
      enabled: true
    db:
      enabled: true

  metrics:
    enable:
      all: true
    tags:
      application: iitbase-backend
    export:
      prometheus:
        enabled: true