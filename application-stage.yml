#application-stage.yml
spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3          # was defaulting to 10 — saves ~35–70MB
      minimum-idle: 1               # don't hold 3 connections when idle
      idle-timeout: 300000          # release idle connections after 5 min
      connection-timeout: 20000
      max-lifetime: 1200000
  data:
    redis:
      lettuce:
        pool:
          max-active: 3             # default is 8
          max-idle: 2
          min-idle: 0               # release when not in use
          time-between-eviction-runs: 60000
  task:
    execution:
      pool:
        core-size: 1                # was 2 — you have 1 signup/day
        max-size: 3                 # was 5
        queue-capacity: 25          # was 50
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
redis:
  url: ${REDIS_URL}
logging:
  level:
    com.iitbase: INFO
    org.springframework.security: WARN
    org.springframework.data.redis: WARN
    io.lettuce.core: WARN

email:
  provider: resend
  from: ${FROM_EMAIL:hello@iitbase.com}
  enabled: ${EMAIL_ENABLED:true}
  otp-enabled: ${EMAIL_OTP_ENABLED:true}
  events-enabled: ${EMAIL_EVENTS_ENABLED:true}

resend:
  api-key: ${RESEND_API_KEY}

llm:
  provider: openai   # switch to 'openai' when OpenAiResumeParser is added
anthropic:
  api-key: ${ANTHROPIC_API_KEY}  # set in Railway env vars
openai:
  api-key: ${OPENAI_API_KEY}
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false