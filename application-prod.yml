spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      url: ${SPRING_REDIS_URL}
      connect-timeout: 2000
      timeout: 2000
  redis:
    lettuce:
      pool:
        enabled: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.iitbase: INFO
    org.springframework.security: WARN
    org.springframework.data.redis: DEBUG
    io.lettuce.core: DEBUG

email:
  provider: resend
  from: ${FROM_EMAIL:hello@iitbase.com}
  enabled: ${EMAIL_ENABLED:true}
  otp-enabled: ${EMAIL_OTP_ENABLED:true}
  events-enabled: ${EMAIL_EVENTS_ENABLED:true}

resend:
  api-key: ${RESEND_API_KEY}