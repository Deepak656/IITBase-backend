spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:iitbase-db-prod}:5432/iitbase
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST:redis.iitbase.com}
      port: 6379
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true # Recommended for production
      timeout: 5000

jwt:
  secret: ${JWT_SECRET_KEY} # Must be a long, secure string
  expiration: 86400000

sendgrid:
  api:
    key: ${SENDGRID_API_KEY}
  from-email: hello@iitbase.com